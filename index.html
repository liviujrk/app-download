<!DOCTYPE html>
<html>
<head>
    <title>Redirecting to App Store...</title>
    <script>
        var userAgent = navigator.userAgent || navigator.vendor || window.opera;

        // If Android
        if (/android/i.test(userAgent)) {
            window.location.replace("https://play.google.com/store/apps/details?id=eu.whenscarsbecomeart.app");
        } 
        // If iOS
        else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
            window.location.replace("https://apps.apple.com/us/app/when-scars-become-art/id6762191954");
        } 
        // Fallback for desktop or other devices
        else {
            window.location.replace("https://whenscarsbecomeart.eu/"); 
        }
    </script>
</head>
<body>
    <p>Redirecting you to the correct app store...</p>
</body>
</html>
